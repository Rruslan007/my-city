<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏙️ Городской Магнат</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        
        #mapContainer {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: grab;
            background: #1a1a2e;
        }
        #mapContainer:active { cursor: grabbing; }
        
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: pixelated;
        }
        
        /* ===== ФУТЕР ===== */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 8px 16px;
            display: flex;
            gap: 4px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .footer button {
            background: none;
            border: none;
            color: #aaa;
            font-size: 10px;
            text-align: center;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 16px;
            transition: 0.2s;
            min-width: 44px;
        }
        .footer button:hover { background: rgba(255,255,255,0.1); color: white; }
        .footer button .icon { font-size: 18px; display: block; margin-bottom: 2px; }
        .footer button.active { color: #e94560; }
        
        /* ===== МОДАЛЬНОЕ ОКНО ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        
        .modal {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 24px;
            max-width: 380px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .modal h2 { color: #e94560; font-size: 20px; margin-bottom: 12px; text-align: center; }
        .modal .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #666;
            font-size: 22px;
            cursor: pointer;
        }
        .modal .close-btn:hover { color: white; }
        
        .building-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
        .building-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .building-item:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.2);
        }
        .building-item .info { flex: 1; }
        .building-item .info .bname { font-size: 14px; }
        .building-item .info .bsize { font-size: 11px; color: #888; }
        .building-item .info .bcost { font-size: 12px; color: #f1c40f; }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 14px;
            z-index: 3000;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.show { opacity: 1; }
        .toast.success { border-color: #2ecc71; }
        .toast.error { border-color: #e74c3c; }
        .toast.info { border-color: #3498db; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    </style>
</head>
<body>

<div id="mapContainer">
    <canvas id="gameCanvas"></canvas>
</div>

<div class="footer">
    <button class="active" onclick="centerMap()"><span class="icon">🏠</span>Главная</button>
    <button onclick="showStats()"><span class="icon">📊</span>Статистика</button>
    <button onclick="openBuildModal()"><span class="icon">🏗️</span>Стройка</button>
    <button onclick="closeApp()"><span class="icon">❌</span>Закрыть</button>
</div>

<div class="modal-overlay" id="buildModal">
    <div class="modal">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <h2>🏗️ Строительство</h2>
        <div class="building-list" id="buildingList"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 1. ИНИЦИАЛИЗАЦИЯ TELEGRAM
// ============================================================

const tg = window.Telegram.WebApp;
tg.ready();
const user = tg.initDataUnsafe.user || { id: 0, username: 'Гость' };

// ============================================================
// 2. НАСТРОЙКИ КАРТЫ
// ============================================================

const canvas = document.getElementById('gameCanvas');
const container = document.getElementById('mapContainer');

// Размеры карты в "тайлах"
const COLS = 18;
const ROWS = 14;
const TILE_SIZE = 60;

// Размер карты в пикселях
const MAP_WIDTH = COLS * TILE_SIZE;
const MAP_HEIGHT = ROWS * TILE_SIZE;

canvas.width = MAP_WIDTH;
canvas.height = MAP_HEIGHT;
canvas.style.width = MAP_WIDTH + 'px';
canvas.style.height = MAP_HEIGHT + 'px';

const ctx = canvas.getContext('2d');

// Переменные для перемещения
let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let startX, startY, dragStartX, dragStartY;

// ============================================================
// 3. ГЕНЕРАЦИЯ КАРТЫ
// ============================================================

// Типы тайлов
const T = {
    ROAD: 0,
    GRASS: 1,
    PARK: 2,
    WATER: 3,
    BRIDGE: 4,
    SQUARE: 5,
    RAILWAY: 6,
    BUILDING: 7,
    EMPTY: 8
};

// Карта (двумерный массив)
let map = [];

function generateMap() {
    // Заполняем травой
    for (let r = 0; r < ROWS; r++) {
        map[r] = [];
        for (let c = 0; c < COLS; c++) {
            map[r][c] = T.GRASS;
        }
    }
    
    // Дороги (горизонтальные и вертикальные магистрали)
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const isHorRoad = r % 3 === 1;
            const isVerRoad = c % 3 === 1;
            
            // Вода (извилистая река)
            const isWater = (r >= 3 && r <= 7 && c >= 5 && c <= 7) ||
                           (r >= 6 && r <= 9 && c >= 10 && c <= 13) ||
                           (r >= 2 && r <= 4 && c >= 8 && c <= 10);
            
            if (isWater) {
                map[r][c] = T.WATER;
            } else if (isHorRoad || isVerRoad) {
                // Не делаем дороги на воде
                if (map[r][c] !== T.WATER) {
                    map[r][c] = T.ROAD;
                    // Мосты
                    if (isWater && (isHorRoad || isVerRoad)) {
                        map[r][c] = T.BRIDGE;
                    }
                }
            }
        }
    }
    
    // Парк (большой зелёный массив)
    for (let r = 2; r < 6; r++) {
        for (let c = 11; c < 16; c++) {
            if (map[r][c] !== T.WATER && map[r][c] !== T.ROAD) {
                map[r][c] = T.PARK;
            }
        }
    }
    
    // Центральная площадь
    for (let r = 5; r < 9; r++) {
        for (let c = 5; c < 9; c++) {
            if (map[r][c] !== T.WATER && map[r][c] !== T.ROAD) {
                map[r][c] = T.SQUARE;
            }
        }
    }
    
    // Участки для застройки (разных цветов)
    const plotPositions = [
        {r: 1, c: 1, size: 2}, {r: 1, c: 4, size: 2}, {r: 2, c: 8, size: 3},
        {r: 4, c: 1, size: 3}, {r: 4, c: 10, size: 4}, {r: 5, c: 12, size: 2},
        {r: 7, c: 1, size: 4}, {r: 7, c: 10, size: 5}, {r: 8, c: 12, size: 3},
        {r: 10, c: 1, size: 2}, {r: 10, c: 4, size: 3}, {r: 10, c: 10, size: 6},
        {r: 11, c: 6, size: 4}, {r: 11, c: 12, size: 2}, {r: 12, c: 2, size: 5},
        {r: 12, c: 8, size: 3}, {r: 13, c: 4, size: 2}, {r: 13, c: 10, size: 4}
    ];
    
    plotPositions.forEach(p => {
        for (let dr = 0; dr < p.size; dr++) {
            for (let dc = 0; dc < p.size; dc++) {
                const rr = p.r + dr;
                const cc = p.c + dc;
                if (rr < ROWS && cc < COLS && map[rr][cc] === T.GRASS) {
                    map[rr][cc] = T.EMPTY;
                }
            }
        }
    });
}

// ============================================================
// 4. РИСОВАНИЕ КАРТЫ
// ============================================================

function drawMap() {
    ctx.clearRect(0, 0, MAP_WIDTH, MAP_HEIGHT);
    
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const x = c * TILE_SIZE;
            const y = r * TILE_SIZE;
            const tile = map[r][c];
            
            switch(tile) {
                case T.GRASS:
                    ctx.fillStyle = '#4a8f5c';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    // Добавляем текстуру травы
                    for (let i = 0; i < 5; i++) {
                        const gx = x + Math.random() * TILE_SIZE;
                        const gy = y + Math.random() * TILE_SIZE;
                        ctx.fillStyle = Math.random() > 0.5 ? '#3d7a4e' : '#5a9f6a';
                        ctx.fillRect(gx, gy, 2, 2);
                    }
                    break;
                    
                case T.ROAD:
                    ctx.fillStyle = '#4a4a4a';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    // Разметка дороги
                    ctx.fillStyle = '#666';
                    if (r % 3 === 1) {
                        // Горизонтальная дорога
                        for (let i = 0; i < 8; i++) {
                            ctx.fillRect(x + i * 8 + 2, y + 28, 4, 4);
                        }
                    }
                    if (c % 3 === 1) {
                        // Вертикальная дорога
                        for (let i = 0; i < 8; i++) {
                            ctx.fillRect(x + 28, y + i * 8 + 2, 4, 4);
                        }
                    }
                    break;
                    
                case T.PARK:
                    ctx.fillStyle = '#2d7a3a';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    // Деревья в парке
                    for (let i = 0; i < 6; i++) {
                        const tx = x + 10 + Math.random() * 40;
                        const ty = y + 10 + Math.random() * 40;
                        ctx.beginPath();
                        ctx.arc(tx, ty, 6 + Math.random() * 4, 0, Math.PI * 2);
                        ctx.fillStyle = '#1a5a2a';
                        ctx.fill();
                        ctx.fillStyle = '#2a7a3a';
                        ctx.beginPath();
                        ctx.arc(tx, ty, 4 + Math.random() * 3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    break;
                    
                case T.WATER:
                    // Вода с волнами
                    const grad = ctx.createLinearGradient(x, y, x + TILE_SIZE, y + TILE_SIZE);
                    grad.addColorStop(0, '#2980b9');
                    grad.addColorStop(0.5, '#3498db');
                    grad.addColorStop(1, '#1a6a9a');
                    ctx.fillStyle = grad;
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    // Волны
                    for (let i = 0; i < 3; i++) {
                        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        const wx = x + 10 + i * 15 + Math.sin(Date.now() / 2000 + i) * 3;
                        const wy = y + 10 + i * 15 + Math.cos(Date.now() / 3000 + i) * 3;
                        ctx.arc(wx, wy, 8, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    break;
                    
                case T.BRIDGE:
                    ctx.fillStyle = '#8a7a5a';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#6a5a3a';
                    ctx.fillRect(x + 2, y + 2, TILE_SIZE - 4, 6);
                    ctx.fillRect(x + 2, y + TILE_SIZE - 8, TILE_SIZE - 4, 6);
                    break;
                    
                case T.SQUARE:
                    // Центральная площадь (плитка)
                    ctx.fillStyle = '#8a8a8a';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    // Рисунок плитки
                    for (let i = 0; i < 3; i++) {
                        for (let j = 0; j < 3; j++) {
                            ctx.fillStyle = (i + j) % 2 === 0 ? '#9a9a9a' : '#7a7a7a';
                            ctx.fillRect(x + i * 20 + 2, y + j * 20 + 2, 18, 18);
                        }
                    }
                    // Фонтан в центре площади
                    const cx = x + TILE_SIZE/2;
                    const cy = y + TILE_SIZE/2;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 12, 0, Math.PI * 2);
                    ctx.fillStyle = '#3498db';
                    ctx.fill();
                    ctx.strokeStyle = '#7f8c8d';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(cx, cy, 12, 0, Math.PI * 2);
                    ctx.stroke();
                    // Статуя
                    ctx.fillStyle = '#d4a574';
                    ctx.fillRect(cx - 3, cy - 10, 6, 6);
                    ctx.fillRect(cx - 1, cy - 16, 2, 6);
                    break;
                    
                case T.RAILWAY:
                    ctx.fillStyle = '#5a5a5a';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#7a7a7a';
                    for (let i = 0; i < 6; i++) {
                        ctx.fillRect(x + i * 10, y + 12, 4, 4);
                        ctx.fillRect(x + i * 10 + 5, y + 12 + 8, 4, 4);
                    }
                    break;
                    
                case T.EMPTY:
                    // Участок для застройки
                    ctx.fillStyle = '#6a8a5a';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                    ctx.strokeStyle = '#8aaa7a';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + 2, y + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    // Мигающая рамка
                    ctx.strokeStyle = 'rgba(255,255,200,0.3)';
                    ctx.lineWidth = 1;
                    ctx.setLineDash([4, 4]);
                    ctx.strokeRect(x + 4, y + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                    ctx.setLineDash([]);
                    // Надпись
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = '10px Arial';
                    ctx.textAlign = 'center';
                    ctx.fillText('🏗️', x + TILE_SIZE/2, y + TILE_SIZE/2 + 4);
                    break;
                    
                default:
                    ctx.fillStyle = '#4a8f5c';
                    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
            }
        }
    }
}

// ============================================================
// 5. АНИМАЦИИ
// ============================================================

let cars = [];
let birds = [];

function createCars() {
    const colors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#e67e22', '#9b59b6', '#ecf0f1'];
    for (let i = 0; i < 6; i++) {
        cars.push({
            x: Math.random() * MAP_WIDTH,
            y: Math.random() * MAP_HEIGHT,
            speed: 0.5 + Math.random() * 1,
            angle: Math.random() * Math.PI * 2,
            color: colors[Math.floor(Math.random() * colors.length)],
            size: 4 + Math.random() * 2
        });
    }
}

function createBirds() {
    for (let i = 0; i < 8; i++) {
        birds.push({
            x: Math.random() * MAP_WIDTH,
            y: 20 + Math.random() * 200,
            speed: 0.3 + Math.random() * 0.5,
            wingPhase: Math.random() * Math.PI * 2,
            amplitude: 5 + Math.random() * 10,
            size: 3 + Math.random() * 2
        });
    }
}

function updateCars() {
    cars.forEach(car => {
        car.x += Math.cos(car.angle) * car.speed;
        car.y += Math.sin(car.angle) * car.speed;
        
        // Ограничение в пределах карты
        if (car.x < 0 || car.x > MAP_WIDTH || car.y < 0 || car.y > MAP_HEIGHT) {
            car.angle += Math.PI / 2;
            car.x = Math.max(10, Math.min(MAP_WIDTH - 10, car.x));
            car.y = Math.max(10, Math.min(MAP_HEIGHT - 10, car.y));
        }
        
        // Случайная смена направления
        if (Math.random() < 0.005) {
            car.angle += (Math.random() - 0.5) * 1.5;
        }
    });
}

function drawCars() {
    cars.forEach(car => {
        const x = car.x;
        const y = car.y;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(car.angle);
        
        // Тень
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 6;
        
        // Кузов
        ctx.fillStyle = car.color;
        ctx.fillRect(-car.size, -car.size/2, car.size * 2, car.size);
        
        // Окна
        ctx.fillStyle = 'rgba(200,230,255,0.6)';
        ctx.fillRect(-car.size + 2, -car.size/2 + 2, car.size - 2, car.size/2 - 4);
        
        ctx.shadowBlur = 0;
        ctx.restore();
    });
}

function drawBirds() {
    const time = Date.now() / 1000;
    birds.forEach(bird => {
        const x = bird.x + Math.sin(time * 0.5 + bird.wingPhase) * 20;
        const y = bird.y + Math.sin(time * bird.speed * 2 + bird.wingPhase) * bird.amplitude;
        
        ctx.save();
        ctx.translate(x, y);
        
        // Тело
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.ellipse(0, 0, bird.size * 1.5, bird.size * 0.5, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Крылья (машущие)
        const wingAngle = Math.sin(time * 2 + bird.wingPhase) * 0.4;
        ctx.fillStyle = '#34495e';
        ctx.beginPath();
        ctx.ellipse(-bird.size, -bird.size * 0.5, bird.size * 0.8, bird.size * 0.3, -wingAngle, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(-bird.size, bird.size * 0.5, bird.size * 0.8, bird.size * 0.3, wingAngle, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.restore();
        
        // Обновление позиции птицы
        bird.x += Math.cos(time * 0.1 + bird.wingPhase) * bird.speed * 0.3;
        if (bird.x > MAP_WIDTH) bird.x = 0;
        if (bird.x < 0) bird.x = MAP_WIDTH;
    });
}

// ============================================================
// 6. ДВИЖЕНИЕ КАРТЫ (С ОГРАНИЧЕНИЯМИ)
// ============================================================

const MAX_OFFSET_X = 0;
const MIN_OFFSET_X = window.innerWidth - MAP_WIDTH;
const MAX_OFFSET_Y = 0;
const MIN_OFFSET_Y = window.innerHeight - MAP_HEIGHT;

function clampOffset() {
    offsetX = Math.min(MAX_OFFSET_X, Math.max(MIN_OFFSET_X, offsetX));
    offsetY = Math.min(MAX_OFFSET_Y, Math.max(MIN_OFFSET_Y, offsetY));
}

function applyOffset() {
    canvas.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
}

// ===== МЫШЬ =====
container.addEventListener('mousedown', (e) => {
    isDragging = true;
    dragStartX = e.clientX - offsetX;
    dragStartY = e.clientY - offsetY;
    container.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    offsetX = e.clientX - dragStartX;
    offsetY = e.clientY - dragStartY;
    clampOffset();
    applyOffset();
});

document.addEventListener('mouseup', () => {
    isDragging = false;
    container.style.cursor = 'grab';
});

// ===== ТАЧ =====
let touchDragStartX = 0, touchDragStartY = 0;

container.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    touchDragStartX = touch.clientX - offsetX;
    touchDragStartY = touch.clientY - offsetY;
}, { passive: true });

container.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    offsetX = touch.clientX - touchDragStartX;
    offsetY = touch.clientY - touchDragStartY;
    clampOffset();
    applyOffset();
}, { passive: false });

// ============================================================
// 7. ОСТАЛЬНЫЕ ФУНКЦИИ
// ============================================================

let selectedPlot = null;

function centerMap() {
    offsetX = Math.round((window.innerWidth - MAP_WIDTH) / 2);
    offsetY = Math.round((window.innerHeight - MAP_HEIGHT) / 2);
    clampOffset();
    applyOffset();
    showToast('🏠 Карта центрирована', 'info');
}

function showStats() {
    tg.sendData(JSON.stringify({ action: 'stats', user_id: user.id }));
    showToast('📊 Запрос статистики отправлен', 'info');
}

function closeApp() {
    tg.close();
}

function showToast(text, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.className = 'toast ' + type + ' show';
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
}
let toastTimeout = null;

// ============================================================
// 8. МОДАЛЬНОЕ ОКНО
// ============================================================

function openBuildModal() {
    const modal = document.getElementById('buildModal');
    const list = document.getElementById('buildingList');
    list.innerHTML = '';
    
    const buildings = [
        { id: 'house', name: 'Жилой дом', size: '2×2', cost: 500 },
        { id: 'shop', name: 'Магазин', size: '2×2', cost: 400 },
        { id: 'school', name: 'Школа', size: '3×3', cost: 700 },
        { id: 'hospital', name: 'Больница', size: '4×4', cost: 1200 },
        { id: 'mall', name: 'Торговый центр', size: '5×5', cost: 1500 },
        { id: 'factory', name: 'Завод', size: '6×6', cost: 2000 }
    ];
    
    buildings.forEach(b => {
        const item = document.createElement('div');
        item.className = 'building-item';
        item.innerHTML = `
            <div class="info">
                <div class="bname">${b.name}</div>
                <div class="bsize">${b.size}</div>
                <div class="bcost">💰 ${b.cost} монет</div>
            </div>
        `;
        item.addEventListener('click', () => {
            tg.sendData(JSON.stringify({
                action: 'build',
                building: b.id,
                name: b.name,
                cost: b.cost,
                size: b.size,
                user_id: user.id
            }));
            showToast(`✅ ${b.name} построен!`, 'success');
            closeModal();
        });
        list.appendChild(item);
    });
    
    modal.classList.add('active');
}

function closeModal() {
    document.getElementById('buildModal').classList.remove('active');
}

// ============================================================
// 9. АНИМАЦИОННЫЙ ЦИКЛ
// ============================================================

function gameLoop() {
    updateCars();
    drawMap();
    drawCars();
    drawBirds();
    requestAnimationFrame(gameLoop);
}

// ============================================================
// 10. ЗАПУСК
// ============================================================

generateMap();
createCars();
createBirds();
centerMap();
gameLoop();

window.addEventListener('resize', () => {
    centerMap();
});
