<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- ВАЖНО: viewport-fit=cover для правильной работы челки Telegram -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>City Magnat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        /* ===== СБРОС И БАЗОВЫЕ НАСТРОЙКИ ===== */
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-tap-highlight-color:transparent; }
        body { 
            background:#0d0d1a; 
            overflow:hidden; 
            height:100dvh; 
            width:100vw; 
            font-family:'Segoe UI',Arial,sans-serif; 
            /* Защита от прокрутки челки Telegram */
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }
        #mapContainer { 
            position:absolute; 
            top:0; left:0; 
            width:100vw; height:100dvh; 
            overflow:hidden; 
            cursor:grab; 
            background:#4a8f5c; 
            touch-action:none; 
            z-index:1;
        }
        #mapContainer:active { cursor:grabbing; }
        #gameCanvas { display:block; width:100%; height:100%; image-rendering:auto; background:transparent; }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ (Заголовок + Баланс) ===== */
        .top-panel { 
            position:fixed; 
            top: calc(8px + env(safe-area-inset-top)); /* Учитываем челку */
            left:0; right:0; 
            z-index:1000; 
            display:flex; 
            justify-content:space-between; 
            align-items:flex-start; 
            padding:0 16px; 
            pointer-events:none; 
        }
        .top-panel > * { pointer-events:auto; }

        /* Заголовок - стеклянный аквариум */
        .game-title { 
            font-family:'Pacifico',cursive; 
            font-size:34px; 
            font-weight:400; 
            color:#fff; 
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(100,200,255,0.1), rgba(255,100,200,0.1), rgba(255,255,255,0.1));
            background-size: 400% 400%;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 4px 0; /* Без рамок, только текст */
            border-radius: 0;
            box-shadow: none;
            letter-spacing:1px;
            text-shadow: 0 0 20px rgba(100,200,255,0.3);
            /* Анимация аквариума (переливы + поворот цвета) */
            animation: aquariumFloat 6s ease-in-out infinite;
        }
        @keyframes aquariumFloat {
            0% { background-position: 0% 50%; filter: hue-rotate(0deg) drop-shadow(0 0 5px rgba(100,200,255,0.2)); }
            50% { background-position: 100% 50%; filter: hue-rotate(20deg) drop-shadow(0 0 15px rgba(255,100,200,0.4)); }
            100% { background-position: 0% 50%; filter: hue-rotate(0deg) drop-shadow(0 0 5px rgba(100,200,255,0.2)); }
        }

        /* Балансы (Монеты и Кристаллы) */
        .right-group { 
            display:flex; 
            flex-direction:column; 
            align-items:flex-end; 
            gap:4px; 
        }
        .glass-box { 
            background:rgba(255,255,255,0.06); 
            backdrop-filter:blur(12px); 
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.08); 
            border-radius:30px; 
            padding:4px 12px; 
            box-shadow:0 4px 30px rgba(0,0,0,0.2); 
            display:flex; 
            align-items:center; 
            gap:4px; 
            font-weight:700; 
            color:#fff; 
            font-size:14px; 
            white-space:nowrap; 
            line-height:1;
        }
        .glass-box .icon { font-size:16px; }
        .glass-box .amount { font-size:15px; font-weight:700; }
        .glass-box.coins .amount { color:#f1c40f; }
        .glass-box.gems .amount { color:#3498db; }

        /* ===== КВЕСТЫ ===== */
        .quest-box { 
            position:fixed; 
            right:16px; 
            bottom:85px; /* Поднял выше, чтобы не перекрывать полосу опыта */
            z-index:1000; 
            background:rgba(255,255,255,0.06); 
            backdrop-filter:blur(12px); 
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.08); 
            border-radius:16px; 
            padding:6px 10px; 
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            box-shadow:0 4px 30px rgba(0,0,0,0.2); 
            color:#fff; 
            font-weight:600; 
            cursor:pointer; 
            transition:0.2s; 
        }
        .quest-box:hover { background:rgba(255,255,255,0.12); }
        .quest-box .icon { font-size:18px; line-height:1; }
        .quest-box .label { font-size:8px; text-transform:uppercase; letter-spacing:0.5px; opacity:0.8; margin-top:1px; }

        /* ===== ПОЛОСА ОПЫТА (впритык к футеру) ===== */
        .level-bar-wrapper { 
            position:fixed; 
            bottom:76px; /* 72px (футер) + 4px отступ */
            left:50%; 
            transform:translateX(-50%);
            z-index:1000; 
            width:calc(100% - 40px); 
            max-width:600px;
            background:rgba(255,255,255,0.05); 
            backdrop-filter:blur(12px); 
            -webkit-backdrop-filter:blur(12px);
            border:1px solid rgba(255,255,255,0.06); 
            border-radius:12px; 
            padding:6px 14px; 
            box-shadow:0 4px 30px rgba(0,0,0,0.3); 
            pointer-events:none;
        }
        .level-top { 
            display:flex; 
            justify-content:space-between; 
            font-weight:700; 
            color:#fff; 
            font-size:12px; 
        }
        .level-top .lvl { color:#e94560; font-size:13px; }
        .level-top .xp { opacity:0.7; font-size:11px; }
        .level-progress { 
            width:100%; 
            height:5px; 
            background:rgba(255,255,255,0.1); 
            border-radius:10px; 
            overflow:hidden; 
            margin-top:3px;
        }
        .level-progress .fill { height:100%; width:0%; background:linear-gradient(90deg,#e94560,#f39c12); transition:width 0.6s; }

        /* ===== ФУТЕР (старт от низа, тупые верхние углы) ===== */
        .footer { 
            position:fixed; 
            bottom:0; left:0; right:0; 
            height:72px; /* 1.2 см */
            padding-bottom: env(safe-area-inset-bottom); /* Учет полоски iPhone */
            z-index:1000; 
            background:rgba(0,0,0,0.75); 
            backdrop-filter:blur(20px); 
            -webkit-backdrop-filter:blur(20px);
            display:flex; 
            justify-content:space-around; 
            align-items:center; 
            border-top:1px solid rgba(255,255,255,0.06);
            /* Два тупых верхних угла */
            border-top-left-radius: 18px;
            border-top-right-radius: 18px;
            box-shadow:0 -8px 30px rgba(0,0,0,0.5);
        }
        .footer button { 
            background:none; border:none; color:#aaa; 
            font-size:9px; text-align:center; 
            padding:4px 6px; cursor:pointer; 
            min-width:44px; 
            display:flex; flex-direction:column; align-items:center; gap:1px; 
            font-weight:500; outline:none; transition:0.2s;
            position:relative;
        }
        .footer button:hover { background:rgba(255,255,255,0.05); border-radius:12px; color:#fff; }
        .footer button .icon { width:22px; height:22px; object-fit:contain; display:block; }
        .footer button .label { font-size:7px; text-transform:uppercase; letter-spacing:0.3px; opacity:0.7; }
        .footer button.active { color:#e94560; }
        .footer button.active .label { opacity:1; }

        /* ===== АДАПТАЦИЯ ПОД МАЛЕНЬКИЕ ЭКРАНЫ ===== */
        @media (max-width:480px) {
            .game-title { font-size:24px; }
            .glass-box { font-size:12px; padding:3px 10px; }
            .glass-box .amount { font-size:13px; }
            .level-bar-wrapper { bottom:76px; width:calc(100% - 20px); padding:4px 10px; }
            .footer { height:64px; } /* Чуть ниже на небольших телефонах */
        }
    </style>
</head>
<body>
    <div id="mapContainer"><canvas id="gameCanvas"></canvas></div>

    <!-- Верхняя панель -->
    <div class="top-panel">
        <div class="game-title">City Magnat</div>
        <div class="right-group">
            <div class="glass-box coins"><span class="icon">🪙</span><span class="amount" id="coinAmount">12 340</span></div>
            <div class="glass-box gems"><span class="icon">💎</span><span class="amount" id="gemAmount">85</span></div>
        </div>
    </div>

    <!-- Полоса опыта -->
    <div class="level-bar-wrapper">
        <div class="level-top">
            <span class="lvl">LVL 1</span>
            <span class="xp">0 / 100 XP</span>
        </div>
        <div class="level-progress"><div class="fill" style="width:0%;"></div></div>
    </div>

    <!-- Кнопка квестов -->
    <div class="quest-box" onclick="alert('Квесты скоро!')">
        <span class="icon">📋</span>
        <span class="label">Quests</span>
    </div>

    <!-- Футер (от низа) -->
    <div class="footer" id="footer">
        <button onclick="alert('Bank')"><img src="bank_icon.png" alt="Bank" class="icon" onerror="this.textContent='💰'"><span class="label">Bank</span></button>
        <button onclick="alert('Resources')"><img src="resources_icon.png" alt="Resources" class="icon" onerror="this.textContent='📦'"><span class="label">Resources</span></button>
        <button onclick="centerMap()" class="active"><img src="home_icon.png" alt="Home" class="icon" onerror="this.textContent='🏠'"><span class="label">Home</span></button>
        <button onclick="alert('Build')"><img src="build_icon.png" alt="Build" class="icon" onerror="this.textContent='🏗️'"><span class="label">Build</span></button>
        <button onclick="alert('Stats')"><img src="statistic_icon.png" alt="Stats" class="icon" onerror="this.textContent='📊'"><span class="label">Stats</span></button>
    </div>

    <!-- ==================================================================== -->
    <!-- СКРИПТ (Движок карты + Генерация сетки из вашего эскиза) -->
    <!-- ==================================================================== -->
    <script>
        // Настройка Telegram Mini App
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand(); // Принудительно раскрываем на весь экран
        }

        // ------------------------------------------------
        // 1. КОНСТАНТЫ И КАМЕРА
        // ------------------------------------------------
        const MAP_W = 30000;
        const MAP_H = 20000;
        const ROAD_BASE = 64; // Ширина дороги
        const TROTTOIR_W = 24; // Тротуар

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let camera = { x: MAP_W/2, y: MAP_H/2, zoom: 0.45 };

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function centerMap() {
            camera.x = MAP_W/2;
            camera.y = MAP_H/2;
        }

        // Drag (перетаскивание)
        let isDrag = false, startX, startY, camX, camY;
        canvas.addEventListener('mousedown', e => { isDrag = true; startX = e.clientX; startY = e.clientY; camX = camera.x; camY = camera.y; });
        document.addEventListener('mousemove', e => {
            if (!isDrag) return;
            camera.x = camX - (e.clientX - startX) / camera.zoom;
            camera.y = camY - (e.clientY - startY) / camera.zoom;
            clampCam();
        });
        document.addEventListener('mouseup', () => isDrag = false);

        canvas.addEventListener('touchstart', e => { if(e.touches.length===1){ isDrag=true; startX=e.touches[0].clientX; startY=e.touches[0].clientY; camX=camera.x; camY=camera.y; } });
        document.addEventListener('touchmove', e => { if(isDrag && e.touches.length===1){ camera.x = camX - (e.touches[0].clientX - startX) / camera.zoom; camera.y = camY - (e.touches[0].clientY - startY) / camera.zoom; clampCam(); } });
        document.addEventListener('touchend', () => isDrag = false);

        function clampCam() {
            const w = canvas.width / camera.zoom;
            const h = canvas.height / camera.zoom;
            camera.x = Math.min(MAP_W - w/2, Math.max(w/2, camera.x));
            camera.y = Math.min(MAP_H - h/2, Math.max(h/2, camera.y));
        }

        // ------------------------------------------------
        // 2. ГЕНЕРАЦИЯ ИДЕАЛЬНОЙ КАРТЫ (Сетка)
        // ------------------------------------------------
        const city = {
            roads: [],
            intersections: [],
            sidewalks: [],
            crosswalks: [],
            plots: [],

            generate() {
                // Сетка 400px идеально ложится под 5x5 и 3x3
                const BLOCK_STEP = 400; 
                const cols = Math.floor((MAP_W - 200) / BLOCK_STEP);
                const rows = Math.floor((MAP_H - 200) / BLOCK_STEP);
                
                // Генерация участков
                for(let r = 0; r < rows; r++) {
                    for(let c = 0; c < cols; c++) {
                        const bx = 100 + c * BLOCK_STEP + BLOCK_STEP/2;
                        const by = 100 + r * BLOCK_STEP + BLOCK_STEP/2;
                        const innerSize = BLOCK_STEP - 40; // 20px отступа с каждой стороны
                        
                        let size = 400; // 5x5
                        if(Math.random() > 0.5) size = 240; // 3x3
                        
                        const px = bx - innerSize/2;
                        const py = by - innerSize/2;
                        
                        this.plots.push({
                            x: px, y: py, w: size, h: size,
                            label: (size === 400) ? '5×5' : '3×3',
                            color: (size === 400) ? 'rgba(241,196,15,0.2)' : 'rgba(52,152,219,0.2)',
                            border: (size === 400) ? '#f1c40f' : '#3498db'
                        });
                    }
                }

                // Генерация дорог (вокруг кварталов)
                const spacing = BLOCK_STEP;
                for(let i = 0; i <= rows; i++) {
                    const yPos = 100 + i * spacing;
                    const width = ROAD_BASE * (0.8 + Math.random() * 0.4);
                    this.roads.push({ x1: 0, y1: yPos, x2: MAP_W, y2: yPos, w: width, isH: true });
                    this.sidewalks.push({ x1: 0, y1: yPos - width/2 - TROTTOIR_W, x2: MAP_W, y2: yPos - width/2 });
                    this.sidewalks.push({ x1: 0, y1: yPos + width/2, x2: MAP_W, y2: yPos + width/2 + TROTTOIR_W });
                }
                for(let i = 0; i <= cols; i++) {
                    const xPos = 100 + i * spacing;
                    const width = ROAD_BASE * (0.8 + Math.random() * 0.4);
                    this.roads.push({ x1: xPos, y1: 0, x2: xPos, y2: MAP_H, w: width, isH: false });
                    this.sidewalks.push({ x1: xPos - width/2 - TROTTOIR_W, y1: 0, x2: xPos - width/2, y2: MAP_H });
                    this.sidewalks.push({ x1: xPos + width/2, y1: 0, x2: xPos + width/2 + TROTTOIR_W, y2: MAP_H });
                }

                // Перекрестки
                for(let r = 0; r <= rows; r++) {
                    for(let c = 0; c <= cols; c++) {
                        this.intersections.push({ x: 100 + c * spacing, y: 100 + r * spacing });
                    }
                }

                // Зебры перед перекрестками (строго по правилам)
                for(let inter of this.intersections) {
                    const offset = ROAD_BASE/2 + TROTTOIR_W + 4;
                    const coords = [
                        {x: inter.x, y: inter.y - offset}, // Север
                        {x: inter.x, y: inter.y + offset}, // Юг
                        {x: inter.x - offset, y: inter.y}, // Запад
                        {x: inter.x + offset, y: inter.y}  // Восток
                    ];
                    for(let c of coords) {
                        this.crosswalks.push({ x: c.x - 20, y: c.y, w: 40, h: 10 });
                    }
                }
            },

            draw() {
                const cx = canvas.width / 2 - camera.x * camera.zoom;
                const cy = canvas.height / 2 - camera.y * camera.zoom;

                ctx.fillStyle = '#4a8f5c';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.save();
                ctx.translate(cx, cy);
                ctx.scale(camera.zoom, camera.zoom);

                // Тротуары
                ctx.fillStyle = '#b0b0b0';
                for(let s of this.sidewalks) ctx.fillRect(s.x1, s.y1, s.x2 - s.x1, s.y2 - s.y1);

                // Дороги
                ctx.fillStyle = '#2a2a2a';
                for(let r of this.roads) {
                    if(r.isH) ctx.fillRect(r.x1, r.y1 - r.w/2, r.x2 - r.x1, r.w);
                    else ctx.fillRect(r.x1 - r.w/2, r.y1, r.w, r.y2 - r.y1);
                }

                // Разметка (пунктир)
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 3;
                ctx.setLineDash([18, 18]);
                for(let r of this.roads) {
                    ctx.beginPath();
                    ctx.moveTo(r.x1, r.y1);
                    ctx.lineTo(r.x2, r.y2);
                    ctx.stroke();
                }
                ctx.setLineDash([]);

                // Перекрестки (чистые, перекрывают всё)
                ctx.fillStyle = '#2a2a2a';
                for(let inter of this.intersections) {
                    const s = ROAD_BASE + TROTTOIR_W*2 + 8;
                    ctx.fillRect(inter.x - s/2, inter.y - s/2, s, s);
                }

                // Зебры (бело-желтые)
                for(let z of this.crosswalks) {
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(z.x, z.y, z.w, z.h);
                    ctx.fillStyle = '#f1c40f';
                    ctx.fillRect(z.x + 5, z.y, z.w - 10, z.h);
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(z.x + 10, z.y, z.w - 20, z.h);
                }

                // Участки (как на вашем эскизе)
                for(let p of this.plots) {
                    ctx.fillStyle = '#4a8f5c';
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    
                    ctx.strokeStyle = p.border;
                    ctx.lineWidth = 4;
                    ctx.setLineDash([8, 8]);
                    ctx.strokeRect(p.x + 8, p.y + 8, p.w - 16, p.h - 16);
                    ctx.setLineDash([]);
                    
                    ctx.fillStyle = '#e74c3c';
                    ctx.font = 'bold 48px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(p.label, p.x + p.w/2, p.y + p.h/2);
                }

                ctx.restore();
            }
        };

        // ============================================================
        // 3. ЗАПУСК ИГРЫ
        // ============================================================
        city.generate();

        function gameLoop() {
            city.draw();
            requestAnimationFrame(gameLoop);
        }
        gameLoop();

    </script>
</body>
</html>
