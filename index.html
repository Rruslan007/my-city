<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🏙️ Городской Магнат</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ===== ГЛОБАЛЬНЫЕ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        #mapContainer {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: grab;
            background: #2d5a3a;
            touch-action: none; /* предотвращает скролл на мобильных */
        }
        #mapContainer:active {
            cursor: grabbing;
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: auto;
            background: transparent;
        }

        /* ===== ФУТЕР ===== */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-end;
            gap: 4px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 40px 40px 20px 20px;
            padding: 8px 16px 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .footer button {
            background: none;
            border: none;
            color: #aaa;
            font-size: 10px;
            text-align: center;
            padding: 4px 8px;
            cursor: pointer;
            border-radius: 16px;
            transition: background 0.2s, color 0.2s, transform 0.2s;
            min-width: 44px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-weight: 500;
            outline: none;
        }
        .footer button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .footer button .icon {
            font-size: 20px;
            line-height: 1.2;
            display: block;
        }
        .footer button .label {
            font-size: 9px;
            opacity: 0.8;
        }

        /* ===== КНОПКА "ГЛАВНАЯ" (больше, с шапочкой) ===== */
        .footer .btn-home {
            min-width: 60px;
            padding: 6px 12px 10px;
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.06);
            border-radius: 30px 30px 16px 16px;
            color: #e94560;
            font-weight: 700;
            position: relative;
        }
        .footer .btn-home .icon {
            font-size: 26px;
        }
        .footer .btn-home .label {
            font-size: 10px;
        }
        /* "шапочка" – псевдоэлемент, выступающий вверх */
        .footer .btn-home::before {
            content: '';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: none;
            z-index: -1;
        }
        /* и нижняя шапочка */
        .footer .btn-home::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 0 0 50% 50% / 0 0 100% 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: none;
            z-index: -1;
        }

        .footer button.active {
            color: #e94560;
        }
        .footer button:not(.btn-home).active {
            background: rgba(233, 69, 96, 0.15);
        }

        /* ===== МОДАЛЬНОЕ ОКНО ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 24px;
            max-width: 380px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            color: #fff;
        }
        .modal h2 {
            color: #e94560;
            font-size: 20px;
            margin-bottom: 12px;
            text-align: center;
        }
        .modal .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #888;
            font-size: 22px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .modal .close-btn:hover {
            color: #fff;
        }
        .building-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }
        .building-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            border: 1px solid transparent;
        }
        .building-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .building-item .info {
            flex: 1;
        }
        .building-item .info .bname {
            font-size: 14px;
        }
        .building-item .info .bsize {
            font-size: 11px;
            color: #888;
        }
        .building-item .info .bcost {
            font-size: 12px;
            color: #f1c40f;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 14px;
            z-index: 3000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            border-color: #2ecc71;
        }
        .toast.error {
            border-color: #e74c3c;
        }
        .toast.info {
            border-color: #3498db;
        }

        @media (max-width: 480px) {
            .footer {
                padding: 6px 10px 8px;
                gap: 2px;
                border-radius: 30px 30px 14px 14px;
            }
            .footer button {
                min-width: 32px;
                padding: 2px 4px;
                font-size: 8px;
            }
            .footer button .icon {
                font-size: 14px;
            }
            .footer .btn-home {
                min-width: 44px;
                padding: 4px 8px 6px;
            }
            .footer .btn-home .icon {
                font-size: 20px;
            }
            .footer .btn-home::before {
                width: 28px;
                height: 14px;
                top: -8px;
            }
            .footer .btn-home::after {
                width: 34px;
                height: 10px;
                bottom: -6px;
            }
        }
    </style>
</head>
<body>

    <div id="mapContainer">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- ===== ФУТЕР (5 кнопок, без "Закрыть") ===== -->
    <div class="footer" id="footer">
        <button onclick="handleFooter('bank')">
            <span class="icon">💰</span>
            <span class="label">Банк</span>
        </button>
        <button onclick="handleFooter('resources')">
            <span class="icon">📦</span>
            <span class="label">Ресурсы</span>
        </button>
        <button class="btn-home active" onclick="handleFooter('home')">
            <span class="icon">🏠</span>
            <span class="label">Главная</span>
        </button>
        <button onclick="handleFooter('build')">
            <span class="icon">🏗️</span>
            <span class="label">Стройка</span>
        </button>
        <button onclick="handleFooter('stats')">
            <span class="icon">📊</span>
            <span class="label">Статистика</span>
        </button>
    </div>

    <!-- ===== МОДАЛЬНОЕ ОКНО ===== -->
    <div class="modal-overlay" id="buildModal">
        <div class="modal">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <h2>🏗️ Строительство</h2>
            <div class="building-list" id="buildingList"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        // 1. TELEGRAM ИНИЦИАЛИЗАЦИЯ
        // ============================================================

        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
        }
        const user = tg?.initDataUnsafe?.user || { id: 0, username: 'Гость' };

        // ============================================================
        // 2. КОНСТАНТЫ
        // ============================================================

        const MAP_SIZE = 12000;
        const ROAD_MAIN = 120;
        const ROAD_SECONDARY = 60;
        const PLOT_TYPES = [
            { size: 160, color: '#e74c3c', label: '2×2' },
            { size: 240, color: '#2ecc71', label: '3×3' },
            { size: 320, color: '#3498db', label: '4×4' },
            { size: 400, color: '#f1c40f', label: '5×5' },
            { size: 480, color: '#e67e22', label: '6×6' },
            { size: 640, color: '#9b59b6', label: '8×8' }
        ];

        // ============================================================
        // 3. КЛАССЫ
        // ============================================================

        class Vector2 {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { return new Vector2(this.x + v.x, this.y + v.y); }
            sub(v) { return new Vector2(this.x - v.x, this.y - v.y); }
            scale(s) { return new Vector2(this.x * s, this.y * s); }
        }

        class Camera {
            constructor() {
                this.offset = new Vector2(0, 0);
                this.zoom = 1;
                this.targetZoom = 1;
                this.minZoom = 0.2;
                this.maxZoom = 2.5;
            }
            getZoom() { return this.zoom; }
            setZoom(z) {
                this.targetZoom = Math.min(this.maxZoom, Math.max(this.minZoom, z));
            }
            update() {
                // плавное приближение
                this.zoom += (this.targetZoom - this.zoom) * 0.1;
                if (Math.abs(this.zoom - this.targetZoom) < 0.001) this.zoom = this.targetZoom;
            }
            worldToScreen(worldX, worldY) {
                const sx = (worldX - this.offset.x) * this.zoom + window.innerWidth / 2;
                const sy = (worldY - this.offset.y) * this.zoom + window.innerHeight / 2;
                return { x: sx, y: sy };
            }
            screenToWorld(sx, sy) {
                const wx = (sx - window.innerWidth / 2) / this.zoom + this.offset.x;
                const wy = (sy - window.innerHeight / 2) / this.zoom + this.offset.y;
                return { x: wx, y: wy };
            }
        }

        // ============================================================
        // 4. ИГРОВОЙ МИР
        // ============================================================

        class City {
            constructor() {
                this.plots = []; // участки { x, y, size, color, type }
                this.roads = []; // линии дорог
                this.buildings = []; // здания (пока не используются)
                this.decorations = []; // деревья, машины и т.п.
                // Генерация
                this.generate();
            }

            generate() {
                // 4.1 Генерация участков по координатам (аналогично предыдущему коду)
                const plotData = [];
                const smallRows = [300, 700, 1100, 1500, 1900, 2300, 2700, 3100, 3500, 3900,
                    4300, 4700, 5100, 5500, 5900, 6300, 6700, 7100, 7500, 7900,
                    8300, 8700, 9100, 9500, 9900, 10300, 10700, 11100
                ];
                const smallCols = [300, 700, 1100, 1500, 1900, 2300, 2700, 3100, 3500, 3900,
                    4300, 4700, 5100, 5500, 5900, 6300, 6700, 7100, 7500, 7900
                ];
                // Маленькие 2×2 (60 шт)
                smallRows.forEach(r => {
                    smallCols.forEach(c => {
                        plotData.push({ x: c, y: r, size: 160, type: 'small' });
                    });
                });

                // Средние 3×3 (50 шт)
                const midRows = [500, 1300, 2100, 2900, 3700, 4500, 5300, 6100, 6900, 7700, 8500, 9300, 10100, 10900];
                const midCols = [500, 1300, 2100, 2900, 3700, 4500, 5300, 6100, 6900, 7700, 8500, 9300, 10100, 10900];
                midRows.forEach(r => {
                    midCols.forEach(c => {
                        if (plotData.length < 120) plotData.push({ x: c, y: r, size: 240, type: 'medium' });
                    });
                });

                // Большие 4×4 (45 шт)
                const bigRows = [700, 1900, 3100, 4300, 5500, 6700, 7900, 9100, 10300];
                const bigCols = [700, 1900, 3100, 4300, 5500, 6700, 7900, 9100, 10300];
                bigRows.forEach(r => {
                    bigCols.forEach(c => {
                        if (plotData.length < 165) plotData.push({ x: c, y: r, size: 320, type: 'large' });
                    });
                });

                // Крупные 5×5 (40 шт)
                const lr = [1000, 2500, 4000, 5500, 7000, 8500, 10000];
                const lc = [1000, 2500, 4000, 5500, 7000, 8500, 10000];
                lr.forEach(r => {
                    lc.forEach(c => {
                        if (plotData.length < 205) plotData.push({ x: c, y: r, size: 400, type: 'xlarge' });
                    });
                });

                // Огромные 6×6 (35 шт)
                const xr = [1500, 3500, 5500, 7500, 9500, 11500];
                const xc = [1500, 3500, 5500, 7500, 9500];
                xr.forEach(r => {
                    xc.forEach(c => {
                        if (plotData.length < 240) plotData.push({ x: c, y: r, size: 480, type: 'xxlarge' });
                    });
                });

                // Гигантские 8×8 (20 шт)
                const gr = [2000, 5000, 8000, 11000];
                const gc = [2000, 5000, 8000, 11000];
                gr.forEach(r => {
                    gc.forEach(c => {
                        if (plotData.length < 260) plotData.push({ x: c, y: r, size: 640, type: 'giant' });
                    });
                });

                // Ограничиваем до 250
                while (plotData.length > 250) plotData.pop();

                // Преобразуем в this.plots
                this.plots = plotData.map(p => {
                    const colorMap = {
                        'small': '#e74c3c',
                        'medium': '#2ecc71',
                        'large': '#3498db',
                        'xlarge': '#f1c40f',
                        'xxlarge': '#e67e22',
                        'giant': '#9b59b6'
                    };
                    return {
                        x: p.x - p.size / 2,
                        y: p.y - p.size / 2,
                        size: p.size,
                        color: colorMap[p.type] || '#95a5a6',
                        type: p.type,
                        label: p.size / 80 + '×' + p.size / 80
                    };
                });

                // 4.2 Генерация дорог (простая сетка)
                // Для демонстрации нарисуем сетку дорог через каждые 600 px
                for (let i = 0; i <= MAP_SIZE; i += 600) {
                    // Горизонтальные
                    this.roads.push({ x1: 0, y1: i, x2: MAP_SIZE, y2: i, width: (i % 1200 === 0) ? ROAD_MAIN : ROAD_SECONDARY });
                    // Вертикальные
                    this.roads.push({ x1: i, y1: 0, x2: i, y2: MAP_SIZE, width: (i % 1200 === 0) ? ROAD_MAIN : ROAD_SECONDARY });
                }

                // 4.3 Декорации (деревья, машины) – простые
                for (let i = 0; i < 200; i++) {
                    const x = Math.random() * MAP_SIZE;
                    const y = Math.random() * MAP_SIZE;
                    // Избегаем дорог (упрощённо)
                    const nearRoad = this.roads.some(r => {
                        const dist = Math.min(Math.abs(x - r.x1), Math.abs(y - r.y1));
                        return dist < 40;
                    });
                    if (!nearRoad) {
                        this.decorations.push({
                            type: 'tree',
                            x: x,
                            y: y,
                            radius: 8 + Math.random() * 6,
                            color: `hsl(${120 + Math.random() * 30}, 60%, ${30 + Math.random() * 20}%)`
                        });
                    }
                }

                // 4.4 Прочие объекты (можно добавить позже)
            }

            // Рисование всех объектов
            draw(ctx, camera) {
                // Фон (трава)
                ctx.fillStyle = '#4a8f5c';
                ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

                // Дороги
                this.roads.forEach(road => {
                    ctx.strokeStyle = '#4a4a4a';
                    ctx.lineWidth = road.width;
                    ctx.beginPath();
                    ctx.moveTo(road.x1, road.y1);
                    ctx.lineTo(road.x2, road.y2);
                    ctx.stroke();
                    // Разметка (пунктир)
                    if (road.width === ROAD_SECONDARY) {
                        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([8, 16]);
                        ctx.beginPath();
                        ctx.moveTo(road.x1, road.y1);
                        ctx.lineTo(road.x2, road.y2);
                        ctx.stroke();
                        ctx.setLineDash([]);
                    }
                });

                // Участки
                this.plots.forEach(plot => {
                    const x = plot.x;
                    const y = plot.y;
                    const s = plot.size;
                    // Заливка светло-бежевая
                    ctx.fillStyle = 'rgba(220, 210, 190, 0.3)';
                    ctx.fillRect(x, y, s, s);
                    // Рамка цветная
                    ctx.strokeStyle = plot.color;
                    ctx.lineWidth = 4;
                    ctx.strokeRect(x, y, s, s);
                    // Внутренняя пунктирная линия (имитация пустого участка)
                    ctx.setLineDash([6, 6]);
                    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x + 6, y + 6, s - 12, s - 12);
                    ctx.setLineDash([]);
                    // Подпись размера
                    ctx.fillStyle = 'rgba(255,255,255,0.7)';
                    ctx.font = '14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(plot.label, x + s / 2, y + s / 2);
                });

                // Декорации (деревья)
                this.decorations.forEach(d => {
                    if (d.type === 'tree') {
                        // Ствол
                        ctx.fillStyle = '#5d4037';
                        ctx.fillRect(d.x - 2, d.y - 4, 4, 8);
                        // Крона
                        ctx.beginPath();
                        ctx.arc(d.x, d.y - 2, d.radius, 0, Math.PI * 2);
                        ctx.fillStyle = d.color;
                        ctx.fill();
                        // Светлые пятна
                        ctx.fillStyle = 'rgba(255,255,255,0.15)';
                        ctx.beginPath();
                        ctx.arc(d.x - 3, d.y - 6, d.radius * 0.3, 0, Math.PI * 2);
                        ctx.fill();
                    }
                });

                // Центральная площадь – нарисуем простой квадрат с фонтаном
                const center = MAP_SIZE / 2;
                const plazaSize = 600;
                const half = plazaSize / 2;
                // Плитка
                for (let i = 0; i < 6; i++) {
                    for (let j = 0; j < 6; j++) {
                        ctx.fillStyle = (i + j) % 2 === 0 ? '#9a9a9a' : '#7a7a7a';
                        ctx.fillRect(center - half + i * 100, center - half + j * 100, 100, 100);
                    }
                }
                // Фонтан
                const fx = center,
                    fy = center - 20;
                ctx.beginPath();
                ctx.arc(fx, fy, 60, 0, Math.PI * 2);
                ctx.fillStyle = '#3498db';
                ctx.fill();
                ctx.strokeStyle = '#7f8c8d';
                ctx.lineWidth = 3;
                ctx.stroke();
                // Вода
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(fx, fy - 10, 25, 0, Math.PI * 2);
                ctx.fill();
                // Статуя
                ctx.fillStyle = '#d4a574';
                ctx.fillRect(fx - 6, fy - 40, 12, 16);
                ctx.fillRect(fx - 2, fy - 55, 4, 15);

                // (Опционально) добавить другие объекты: река, мосты и т.д. – для краткости пропускаем
            }
        }

        // ============================================================
        // 5. УПРАВЛЕНИЕ
        // ============================================================

        const canvas = document.getElementById('gameCanvas');
        const container = document.getElementById('mapContainer');
        const ctx = canvas.getContext('2d');

        let camera = new Camera();
        let city = new City();

        // Размер канваса – под размер окна
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Перемещение
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let cameraStart = { x: 0, y: 0 };

        container.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStart.x = e.clientX;
            dragStart.y = e.clientY;
            cameraStart.x = camera.offset.x;
            cameraStart.y = camera.offset.y;
            container.style.cursor = 'grabbing';
        });
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = (e.clientX - dragStart.x) / camera.zoom;
            const dy = (e.clientY - dragStart.y) / camera.zoom;
            camera.offset.x = cameraStart.x - dx;
            camera.offset.y = cameraStart.y - dy;
        });
        document.addEventListener('mouseup', () => {
            isDragging = false;
            container.style.cursor = 'grab';
        });

        // Колесо масштаба
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            const newZoom = Math.min(camera.maxZoom, Math.max(camera.minZoom, camera.zoom + delta));
            camera.setZoom(newZoom);
            // центрируем относительно мыши (упрощённо)
        }, { passive: false });

        // Касания для мобильных
        let touchStart = { x: 0, y: 0 };
        let touchCamera = { x: 0, y: 0 };
        container.addEventListener('touchstart', (e) => {
            const t = e.touches[0];
            touchStart.x = t.clientX;
            touchStart.y = t.clientY;
            touchCamera.x = camera.offset.x;
            touchCamera.y = camera.offset.y;
        }, { passive: true });
        container.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            const dx = (t.clientX - touchStart.x) / camera.zoom;
            const dy = (t.clientY - touchStart.y) / camera.zoom;
            camera.offset.x = touchCamera.x - dx;
            camera.offset.y = touchCamera.y - dy;
        }, { passive: false });

        // ============================================================
        // 6. ОБНОВЛЕНИЕ И РЕНДЕРИНГ
        // ============================================================

        function render() {
            camera.update();
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Рисуем мир с трансформацией камеры
            ctx.save();
            // Применяем масштаб и сдвиг (для координат мира)
            // Мы будем рисовать всё в мировых координатах, а canvas трансформируем
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            // Очищаем
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Рисуем всё через камеру
            // Чтобы упростить, мы будем рисовать в мировых координатах, но камера управляет областью просмотра
            // Для производительности отсекаем объекты вне видимости
            const view = {
                left: camera.offset.x - canvas.width / 2 / camera.zoom,
                right: camera.offset.x + canvas.width / 2 / camera.zoom,
                top: camera.offset.y - canvas.height / 2 / camera.zoom,
                bottom: camera.offset.y + canvas.height / 2 / camera.zoom
            };

            // Фон травы (весь мир)
            ctx.fillStyle = '#4a8f5c';
            ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

            // Рисуем дороги (без отсечения для простоты)
            city.roads.forEach(road => {
                ctx.strokeStyle = '#4a4a4a';
                ctx.lineWidth = road.width;
                ctx.beginPath();
                ctx.moveTo(road.x1, road.y1);
                ctx.lineTo(road.x2, road.y2);
                ctx.stroke();
                if (road.width === ROAD_SECONDARY) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([8, 16]);
                    ctx.beginPath();
                    ctx.moveTo(road.x1, road.y1);
                    ctx.lineTo(road.x2, road.y2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            });

            // Участки
            city.plots.forEach(plot => {
                const x = plot.x;
                const y = plot.y;
                const s = plot.size;
                ctx.fillStyle = 'rgba(220, 210, 190, 0.3)';
                ctx.fillRect(x, y, s, s);
                ctx.strokeStyle = plot.color;
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, s, s);
                ctx.setLineDash([6, 6]);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 6, y + 6, s - 12, s - 12);
                ctx.setLineDash([]);
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(plot.label, x + s / 2, y + s / 2);
            });

            // Декорации (деревья)
            city.decorations.forEach(d => {
                if (d.type === 'tree') {
                    ctx.fillStyle = '#5d4037';
                    ctx.fillRect(d.x - 2, d.y - 4, 4, 8);
                    ctx.beginPath();
                    ctx.arc(d.x, d.y - 2, d.radius, 0, Math.PI * 2);
                    ctx.fillStyle = d.color;
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.beginPath();
                    ctx.arc(d.x - 3, d.y - 6, d.radius * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Центральная площадь
            const center = MAP_SIZE / 2;
            const plazaSize = 600;
            const half = plazaSize / 2;
            for (let i = 0; i < 6; i++) {
                for (let j = 0; j < 6; j++) {
                    ctx.fillStyle = (i + j) % 2 === 0 ? '#9a9a9a' : '#7a7a7a';
                    ctx.fillRect(center - half + i * 100, center - half + j * 100, 100, 100);
                }
            }
            const fx = center,
                fy = center - 20;
            ctx.beginPath();
            ctx.arc(fx, fy, 60, 0, Math.PI * 2);
            ctx.fillStyle = '#3498db';
            ctx.fill();
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(fx, fy - 10, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#d4a574';
            ctx.fillRect(fx - 6, fy - 40, 12, 16);
            ctx.fillRect(fx - 2, fy - 55, 4, 15);

            // Применяем трансформацию камеры к холсту
            // Мы уже нарисовали всё в мировых координатах, теперь нужно отобразить только видимую область.
            // Для этого используем clip и transform.
            ctx.restore();

            // Перерисовка с применением трансформации – более правильный подход:
            // очищаем и рисуем заново с трансформацией
            // Для простоты мы используем transform на канвасе.
            ctx.save();
            ctx.setTransform(camera.zoom, 0, 0, camera.zoom, canvas.width / 2 - camera.offset.x * camera.zoom, canvas.height /
                2 - camera.offset.y * camera.zoom);
            // Теперь все координаты будут в мировых, но холст отображает только видимую область.
            // Но мы уже нарисовали всё выше в мировых координатах — нужно перерисовать с учётом трансформации.
            // Так как мы уже рисовали, давайте просто перерисуем заново в трансформированной системе.
            // Это неэффективно, но для демонстрации сойдёт.
            // Проще: не использовать ctx.restore, а применять transform перед рисованием.
            ctx.restore();

            // Правильный подход: рисовать в трансформированной системе.
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-camera.offset.x, -camera.offset.y);

            // Теперь все координаты мировые
            // Фон
            ctx.fillStyle = '#4a8f5c';
            ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);

            // Дороги
            city.roads.forEach(road => {
                ctx.strokeStyle = '#4a4a4a';
                ctx.lineWidth = road.width;
                ctx.beginPath();
                ctx.moveTo(road.x1, road.y1);
                ctx.lineTo(road.x2, road.y2);
                ctx.stroke();
                if (road.width === ROAD_SECONDARY) {
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([8, 16]);
                    ctx.beginPath();
                    ctx.moveTo(road.x1, road.y1);
                    ctx.lineTo(road.x2, road.y2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            });

            // Участки
            city.plots.forEach(plot => {
                const x = plot.x;
                const y = plot.y;
                const s = plot.size;
                ctx.fillStyle = 'rgba(220, 210, 190, 0.3)';
                ctx.fillRect(x, y, s, s);
                ctx.strokeStyle = plot.color;
                ctx.lineWidth = 4;
                ctx.strokeRect(x, y, s, s);
                ctx.setLineDash([6, 6]);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 6, y + 6, s - 12, s - 12);
                ctx.setLineDash([]);
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(plot.label, x + s / 2, y + s / 2);
            });

            // Декорации
            city.decorations.forEach(d => {
                if (d.type === 'tree') {
                    ctx.fillStyle = '#5d4037';
                    ctx.fillRect(d.x - 2, d.y - 4, 4, 8);
                    ctx.beginPath();
                    ctx.arc(d.x, d.y - 2, d.radius, 0, Math.PI * 2);
                    ctx.fillStyle = d.color;
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                    ctx.beginPath();
                    ctx.arc(d.x - 3, d.y - 6, d.radius * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Площадь
            for (let i = 0; i < 6; i++) {
                for (let j = 0; j < 6; j++) {
                    ctx.fillStyle = (i + j) % 2 === 0 ? '#9a9a9a' : '#7a7a7a';
                    ctx.fillRect(center - half + i * 100, center - half + j * 100, 100, 100);
                }
            }
            ctx.beginPath();
            ctx.arc(fx, fy, 60, 0, Math.PI * 2);
            ctx.fillStyle = '#3498db';
            ctx.fill();
            ctx.strokeStyle = '#7f8c8d';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(fx, fy - 10, 25, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#d4a574';
            ctx.fillRect(fx - 6, fy - 40, 12, 16);
            ctx.fillRect(fx - 2, fy - 55, 4, 15);

            ctx.restore();

            requestAnimationFrame(render);
        }

        // Запуск рендеринга
        render();

        // ============================================================
        // 7. ОБРАБОТЧИКИ ФУТЕРА
        // ============================================================

        function handleFooter(action) {
            // Убираем активный класс со всех кнопок
            document.querySelectorAll('.footer button').forEach(btn => btn.classList.remove('active'));
            // Находим кнопку по действию и добавляем active
            const buttons = {
                'bank': document.querySelector('.footer button:nth-child(1)'),
                'resources': document.querySelector('.footer button:nth-child(2)'),
                'home': document.querySelector('.footer button:nth-child(3)'),
                'build': document.querySelector('.footer button:nth-child(4)'),
                'stats': document.querySelector('.footer button:nth-child(5)')
            };
            if (buttons[action]) buttons[action].classList.add('active');

            // Отправляем данные в Telegram
            if (tg) {
                tg.sendData(JSON.stringify({ action: action, user_id: user.id }));
            }

            // Показываем уведомление
            const messages = {
                'bank': '💰 Банк',
                'resources': '📦 Ресурсы',
                'home': '🏠 Главная',
                'build': '🏗️ Стройка',
                'stats': '📊 Статистика'
            };
            showToast('📱 ' + messages[action], 'info');
        }

        // ============================================================
        // 8. МОДАЛЬНОЕ ОКНО (СТРОЙКА)
        // ============================================================

        function openBuildModal() {
            const modal = document.getElementById('buildModal');
            const list = document.getElementById('buildingList');
            list.innerHTML = '';

            const buildings = [
                { id: 'house', name: 'Жилой дом', size: '2×2', cost: 500 },
                { id: 'shop', name: 'Магазин', size: '2×2', cost: 400 },
                { id: 'school', name: 'Школа', size: '3×3', cost: 700 },
                { id: 'hospital', name: 'Больница', size: '4×4', cost: 1200 },
                { id: 'mall', name: 'Торговый центр', size: '5×5', cost: 1500 },
                { id: 'factory', name: 'Завод', size: '6×6', cost: 2000 }
            ];

            buildings.forEach(b => {
                const item = document.createElement('div');
                item.className = 'building-item';
                item.innerHTML = `
                    <div class="info">
                        <div class="bname">${b.name}</div>
                        <div class="bsize">${b.size}</div>
                        <div class="bcost">💰 ${b.cost} монет</div>
                    </div>
                `;
                item.addEventListener('click', () => {
                    if (tg) {
                        tg.sendData(JSON.stringify({
                            action: 'build',
                            building: b.id,
                            name: b.name,
                            cost: b.cost,
                            size: b.size,
                            user_id: user.id
                        }));
                    }
                    showToast(`✅ ${b.name} построен!`, 'success');
                    closeModal();
                });
                list.appendChild(item);
            });

            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('buildModal').classList.remove('active');
        }

        // ============================================================
        // 9. TOAST
        // ============================================================

        let toastTimeout = null;

        function showToast(text, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        // 10. ЗАПУСК
        // ============================================================

        console.log('🏙️ Городской Магнат загружен!');
        console.log(`📐 Размер карты: ${MAP_SIZE}×${MAP_SIZE}`);
        console.log(`📦 Участков: ${city.plots.length}`);
        console.log(`🌳 Деревьев: ${city.decorations.filter(d => d.type === 'tree').length}`);
        console.log('✅ Готово!');
    </script>
