<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>URBANIA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d0d1a;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
            padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
        }

        /* ===== КОНТЕЙНЕР С ФОНОМ ===== */
        #menuContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0d0d1a;
        }

        /* ===== ФОН С РАЗМЫТИЕМ ===== */
        #bgImage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(4px);
            transform: scale(1.02);
            z-index: 0;
        }

        /* ===== ТЁМНЫЙ ОВЕРЛЕЙ ===== */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.25);
            z-index: 1;
        }

        /* ===== НАЗВАНИЕ (рукописное, стеклянное) ===== */
        .game-title {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-family: 'Pacifico', cursive;
            font-size: clamp(32px, 7vw, 52px);
            font-weight: 400;
            color: rgba(255, 255, 255, 0.85);
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.15);
            letter-spacing: 2px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 4px 28px 8px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
            opacity: 0.7;
            animation: glassPulse 4s ease-in-out infinite;
            white-space: nowrap;
            text-align: center;
        }

        @keyframes glassPulse {
            0%,
            100% {
                background: rgba(255, 255, 255, 0.06);
                backdrop-filter: blur(16px);
            }
            50% {
                background: rgba(255, 255, 255, 0.12);
                backdrop-filter: blur(24px);
            }
        }

        /* ===== КНОПКИ (вертикальный список) ===== */
        .menu-buttons {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 88%;
            max-width: 480px;
            margin-top: 10%;
        }

        .menu-btn {
            width: 100%;
            height: 72px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-btn:active {
            transform: scale(0.96);
        }

        .menu-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ===== ПОДПИСЬ ПОД КНОПКОЙ ===== */
        .btn-label {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Segoe UI', Arial, sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            padding: 2px 12px;
            border-radius: 12px;
            white-space: nowrap;
        }

        /* ===== АДАПТАЦИЯ ===== */
        @media (max-width: 480px) {
            .menu-buttons {
                gap: 10px;
                width: 92%;
                margin-top: 12%;
            }
            .menu-btn {
                height: 60px;
                border-radius: 16px;
            }
            .game-title {
                top: 6%;
                font-size: clamp(26px, 6vw, 36px);
                padding: 2px 20px 6px;
            }
            .btn-label {
                font-size: 9px;
                padding: 1px 10px;
                bottom: 5px;
            }
        }

        @media (max-width: 380px) {
            .menu-btn {
                height: 50px;
                border-radius: 12px;
            }
            .menu-buttons {
                gap: 8px;
            }
            .game-title {
                font-size: clamp(22px, 5vw, 28px);
                padding: 2px 14px 4px;
            }
        }
    </style>
</head>
<body>

    <div id="menuContainer">

        <!-- ===== ФОН ===== -->
        <img id="bgImage" src="menu.PNG" alt="Urbania" onerror="this.style.display='none'">

        <!-- ===== ТЁМНЫЙ СЛОЙ ===== -->
        <div class="overlay"></div>

        <!-- ===== НАЗВАНИЕ ===== -->
        <div class="game-title">Urbania</div>

        <!-- ===== КНОПКИ ===== -->
        <div class="menu-buttons">
            <button class="menu-btn" onclick="selectDistrict('centre')">
                <img src="centre.png" alt="Centre" onerror="this.style.display='none'">
                <span class="btn-label">Centre</span>
            </button>

            <button class="menu-btn" onclick="selectDistrict('suburbs')">
                <img src="suburbs.png" alt="Suburbs" onerror="this.style.display='none'">
                <span class="btn-label">Suburbs</span>
            </button>

            <button class="menu-btn" onclick="selectDistrict('park')">
                <img src="park.png" alt="Park" onerror="this.style.display='none'">
                <span class="btn-label">Park</span>
            </button>

            <button class="menu-btn" onclick="selectDistrict('residential')">
                <img src="residential.png" alt="Residential" onerror="this.style.display='none'">
                <span class="btn-label">Residential</span>
            </button>

            <button class="menu-btn" onclick="selectDistrict('industrial')">
                <img src="industrial.png" alt="Industrial" onerror="this.style.display='none'">
                <span class="btn-label">Industrial</span>
            </button>
        </div>

    </div>

    <script>
        // ============================================================
        // 1. TELEGRAM
        // ============================================================
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // ============================================================
        // 2. ВЫБОР РАЙОНА
        // ============================================================
        function selectDistrict(district) {
            console.log('Выбран район:', district);

            const names = {
                centre: 'Деловой центр',
                suburbs: 'Пригород',
                park: 'Городской парк',
                residential: 'Жилой район',
                industrial: 'Промышленная зона'
            };

            if (tg) {
                tg.sendData(JSON.stringify({
                    action: 'select_district',
                    district: district,
                    name: names[district] || district
                }));
            }

            // Визуальный фидбек
            const toast = document.createElement('div');
            toast.textContent = `🏙️ ${names[district] || district}`;
            toast.style.cssText = `
                        position: fixed;
                        bottom: 120px;
                        left: 50%;
                        transform: translateX(-50%);
                        background: rgba(0,0,0,0.7);
                        backdrop-filter: blur(8px);
                        padding: 12px 28px;
                        border-radius: 20px;
                        color: white;
                        font-size: 16px;
                        font-weight: 600;
                        z-index: 1000;
                        border: 1px solid rgba(255,255,255,0.1);
                        transition: opacity 0.3s;
                        opacity: 1;
                    `;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 400);
            }, 2000);
        }

        console.log('🏙️ Urbania загружена!');
        console.log('📱 Telegram Mini App:', !!tg);
    </script>

</body>
</html>
