<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏙️ Городской Магнат</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }
        #mapContainer {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            cursor: grab;
            background: #1a1a2e;
        }
        #mapContainer:active { cursor: grabbing; }
        #gameCanvas {
            position: absolute;
            top: 0;
            left: 0;
            image-rendering: auto;
        }
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 8px 16px;
            display: flex;
            gap: 4px;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .footer button {
            background: none;
            border: none;
            color: #aaa;
            font-size: 10px;
            text-align: center;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 16px;
            transition: 0.2s;
            min-width: 44px;
        }
        .footer button:hover { background: rgba(255,255,255,0.1); color: white; }
        .footer button .icon { font-size: 18px; display: block; margin-bottom: 2px; }
        .footer button.active { color: #e94560; }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 24px;
            max-width: 380px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .modal h2 { color: #e94560; font-size: 20px; margin-bottom: 12px; text-align: center; }
        .modal .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #666;
            font-size: 22px;
            cursor: pointer;
        }
        .modal .close-btn:hover { color: white; }
        .building-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
        .building-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.05);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid transparent;
        }
        .building-item:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
        .building-item .info { flex: 1; }
        .building-item .info .bname { font-size: 14px; }
        .building-item .info .bsize { font-size: 11px; color: #888; }
        .building-item .info .bcost { font-size: 12px; color: #f1c40f; }
        
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 14px;
            z-index: 3000;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .toast.show { opacity: 1; }
        .toast.success { border-color: #2ecc71; }
        .toast.error { border-color: #e74c3c; }
        .toast.info { border-color: #3498db; }
    </style>
</head>
<body>

<div id="mapContainer">
    <canvas id="gameCanvas"></canvas>
</div>

<div class="footer">
    <button class="active" onclick="centerMap()"><span class="icon">🏠</span>Главная</button>
    <button onclick="showStats()"><span class="icon">📊</span>Статистика</button>
    <button onclick="openBuildModal()"><span class="icon">🏗️</span>Стройка</button>
    <button onclick="closeApp()"><span class="icon">❌</span>Закрыть</button>
</div>

<div class="modal-overlay" id="buildModal">
    <div class="modal">
        <button class="close-btn" onclick="closeModal()">✕</button>
        <h2>🏗️ Строительство</h2>
        <div class="building-list" id="buildingList"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 1. TELEGRAM
// ============================================================

const tg = window.Telegram.WebApp;
tg.ready();
const user = tg.initDataUnsafe.user || { id: 0, username: 'Гость' };

// ============================================================
// 2. НАСТРОЙКИ
// ============================================================

const canvas = document.getElementById('gameCanvas');
const container = document.getElementById('mapContainer');
const ctx = canvas.getContext('2d');

// Размеры карты (из промта 12000×12000)
const MAP_SIZE = 12000;

canvas.width = MAP_SIZE;
canvas.height = MAP_SIZE;
canvas.style.width = MAP_SIZE + 'px';
canvas.style.height = MAP_SIZE + 'px';

// Переменные для перемещения
let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let dragStartX, dragStartY, touchStartX, touchStartY;

function getMaxOffsetX() { return Math.min(0, window.innerWidth - MAP_SIZE); }
function getMaxOffsetY() { return Math.min(0, window.innerHeight - MAP_SIZE); }

function clampOffset() {
    offsetX = Math.max(getMaxOffsetX(), Math.min(0, offsetX));
    offsetY = Math.max(getMaxOffsetY(), Math.min(0, offsetY));
}

function applyOffset() {
    canvas.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
}

// ============================================================
// 3. КООРДИНАТЫ УЧАСТКОВ (из промта)
// ============================================================

// Все координаты — центр участка
const plotData = [];

// Маленькие 2×2 (60 шт)
const small = [
    300,700,1100,1500,1900,2300,2700,3100,3500,3900,
    4300,4700,5100,5500,5900,6300,6700,7100,7500,7900,
    8300,8700,9100,9500,9900,10300,10700,11100
];
const smallCols = [
    300,700,1100,1500,1900,2300,2700,3100,3500,3900,
    4300,4700,5100,5500,5900,6300,6700,7100,7500,7900
];
small.forEach(r => {
    smallCols.forEach(c => {
        plotData.push({ x: c, y: r, size: 2, type: 'small' });
    });
});

// Средние 3×3 (50 шт)
const mid = [500,1300,2100,2900,3700,4500,5300,6100,6900,7700,8500,9300,10100,10900];
const midCols = [500,1300,2100,2900,3700,4500,5300,6100,6900,7700,8500,9300,10100,10900];
mid.forEach(r => {
    midCols.forEach(c => {
        if (plotData.length < 120) plotData.push({ x: c, y: r, size: 3, type: 'medium' });
    });
});

// Большие 4×4 (45 шт)
const big = [700,1900,3100,4300,5500,6700,7900,9100,10300];
const bigCols = [700,1900,3100,4300,5500,6700,7900,9100,10300];
big.forEach(r => {
    bigCols.forEach(c => {
        if (plotData.length < 165) plotData.push({ x: c, y: r, size: 4, type: 'large' });
    });
});

// Крупные 5×5 (40 шт)
const large = [1000,2500,4000,5500,7000,8500,10000];
const largeCols = [1000,2500,4000,5500,7000,8500,10000];
large.forEach(r => {
    largeCols.forEach(c => {
        if (plotData.length < 205) plotData.push({ x: c, y: r, size: 5, type: 'xlarge' });
    });
});

// Огромные 6×6 (35 шт)
const xlarge = [1500,3500,5500,7500,9500,11500];
const xlargeCols = [1500,3500,5500,7500,9500];
xlarge.forEach(r => {
    xlargeCols.forEach(c => {
        if (plotData.length < 240) plotData.push({ x: c, y: r, size: 6, type: 'xxlarge' });
    });
});

// Гигантские 8×8 (20 шт)
const giant = [2000,5000,8000,11000];
const giantCols = [2000,5000,8000,11000];
giant.forEach(r => {
    giantCols.forEach(c => {
        if (plotData.length < 260) plotData.push({ x: c, y: r, size: 8, type: 'giant' });
    });
});

// Ограничим до 250 участков
plotData.length = Math.min(plotData.length, 250);

// ============================================================
// 4. ЗАГРУЗКА КАРТЫ
// ============================================================

const mapImage = new Image();
mapImage.crossOrigin = 'anonymous';
mapImage.src = 'https://Rruslan007.github.io/my-city/map.png';

let mapLoaded = false;

mapImage.onload = function() {
    mapLoaded = true;
    console.log('✅ Карта загружена!');
    draw();
};

mapImage.onerror = function() {
    console.warn('⚠️ Карта не загружена. Буду использовать заглушку.');
    // Если карта не загрузилась — рисуем пустой фон
    draw();
};

// ============================================================
// 5. РИСОВАНИЕ КАРТЫ И ЗДАНИЙ
// ============================================================

function draw() {
    ctx.clearRect(0, 0, MAP_SIZE, MAP_SIZE);
    
    // Рисуем карту (если загружена)
    if (mapLoaded) {
        ctx.drawImage(mapImage, 0, 0, MAP_SIZE, MAP_SIZE);
    } else {
        // Заглушка
        ctx.fillStyle = '#2d5a3a';
        ctx.fillRect(0, 0, MAP_SIZE, MAP_SIZE);
        ctx.fillStyle = 'white';
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('⏳ Ожидание карты...', MAP_SIZE/2, MAP_SIZE/2);
    }
    
    // Рисуем здания поверх карты
    plotData.forEach(plot => {
        const size = plot.size * 80; // 80 пикселей на клетку
        const x = plot.x - size/2;
        const y = plot.y - size/2;
        
        // Цвет здания в зависимости от размера
        const colors = {
            small: '#e74c3c',
            medium: '#2ecc71',
            large: '#3498db',
            xlarge: '#f1c40f',
            xxlarge: '#e67e22',
            giant: '#9b59b6'
        };
        const color = colors[plot.type] || '#95a5a6';
        
        // Стены
        ctx.fillStyle = color;
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 10;
        ctx.fillRect(x, y, size, size);
        ctx.shadowBlur = 0;
        
        // Крыша (треугольная)
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + size/2, y - size/3);
        ctx.lineTo(x + size, y);
        ctx.fill();
        
        // Окна (2 ряда по 3 окна)
        ctx.fillStyle = '#3498db';
        const winSize = size/8;
        for (let row = 0; row < 2; row++) {
            for (let col = 0; col < 3; col++) {
                const wx = x + size/4 + col * size/4;
                const wy = y + size/4 + row * size/4;
                ctx.fillRect(wx - winSize/2, wy - winSize/2, winSize, winSize);
                // Рамка окна
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1;
                ctx.strokeRect(wx - winSize/2, wy - winSize/2, winSize, winSize);
            }
        }
        
        // Дверь
        ctx.fillStyle = '#5d4037';
        const doorW = size/6;
        const doorH = size/4;
        const dx = x + size/2 - doorW/2;
        const dy = y + size - doorH;
        ctx.fillRect(dx, dy, doorW, doorH);
        // Ручка
        ctx.fillStyle = '#f1c40f';
        ctx.beginPath();
        ctx.arc(dx + doorW - 4, dy + doorH/2, 3, 0, Math.PI*2);
        ctx.fill();
        
        // Бордюр (контур участка)
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 2;
        ctx.strokeRect(x, y, size, size);
        
        // Подпись размера
        ctx.fillStyle = 'rgba(255,255,255,0.8)';
        ctx.font = '14px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`${plot.size}×${plot.size}`, x + size/2, y + size + 20);
    });
}

// ============================================================
// 6. УПРАВЛЕНИЕ ПЕРЕМЕЩЕНИЕМ
// ============================================================

// МЫШЬ
container.addEventListener('mousedown', (e) => {
    isDragging = true;
    dragStartX = e.clientX - offsetX;
    dragStartY = e.clientY - offsetY;
    container.style.cursor = 'grabbing';
});

document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    offsetX = e.clientX - dragStartX;
    offsetY = e.clientY - dragStartY;
    clampOffset();
    applyOffset();
});

document.addEventListener('mouseup', () => {
    isDragging = false;
    container.style.cursor = 'grab';
});

// ТАЧ
container.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    touchStartX = touch.clientX - offsetX;
    touchStartY = touch.clientY - offsetY;
}, { passive: true });

container.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    offsetX = touch.clientX - touchStartX;
    offsetY = touch.clientY - touchStartY;
    clampOffset();
    applyOffset();
}, { passive: false });

// ============================================================
// 7. ФУНКЦИИ БОТА
// ============================================================

function centerMap() {
    const maxX = getMaxOffsetX();
    const maxY = getMaxOffsetY();
    offsetX = Math.round(maxX / 2);
    offsetY = Math.round(maxY / 2);
    clampOffset();
    applyOffset();
    showToast('🏠 Карта центрирована', 'info');
}

function showStats() {
    tg.sendData(JSON.stringify({ action: 'stats', user_id: user.id }));
    showToast('📊 Запрос статистики отправлен', 'info');
}

function closeApp() { tg.close(); }

let toastTimeout = null;
function showToast(text, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = text;
    toast.className = 'toast ' + type + ' show';
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ============================================================
// 8. МОДАЛЬНОЕ ОКНО
// ============================================================

function openBuildModal() {
    const modal = document.getElementById('buildModal');
    const list = document.getElementById('buildingList');
    list.innerHTML = '';
    
    const buildings = [
        { id: 'house', name: 'Жилой дом', size: '2×2', cost: 500 },
        { id: 'shop', name: 'Магазин', size: '2×2', cost: 400 },
        { id: 'school', name: 'Школа', size: '3×3', cost: 700 },
        { id: 'hospital', name: 'Больница', size: '4×4', cost: 1200 },
        { id: 'mall', name: 'Торговый центр', size: '5×5', cost: 1500 },
        { id: 'factory', name: 'Завод', size: '6×6', cost: 2000 }
    ];
    
    buildings.forEach(b => {
        const item = document.createElement('div');
        item.className = 'building-item';
        item.innerHTML = `
            <div class="info">
                <div class="bname">${b.name}</div>
                <div class="bsize">${b.size}</div>
                <div class="bcost">💰 ${b.cost} монет</div>
            </div>
        `;
        item.addEventListener('click', () => {
            tg.sendData(JSON.stringify({
                action: 'build',
                building: b.id,
                name: b.name,
                cost: b.cost,
                size: b.size,
                user_id: user.id
            }));
            showToast(`✅ ${b.name} построен!`, 'success');
            closeModal();
        });
        list.appendChild(item);
    });
    modal.classList.add('active');
}

function closeModal() {
    document.getElementById('buildModal').classList.remove('active');
}

// ============================================================
// 9. ЗАПУСК
// ============================================================

// Центрируем карту после загрузки
setTimeout(() => {
    centerMap();
}, 500);

// Если карта не загрузилась через 10 секунд — рисуем заглушку
setTimeout(() => {
    if (!mapLoaded) {
        draw();
    }
}, 10000);

window.addEventListener('resize', () => {
    clampOffset();
    applyOffset();
});

// Для отладки
console.log('✅ Код загружен!');
console.log(`📐 Участков: ${plotData.length}`);
console.log(`🖼️ Карта: ${mapImage.src}`);
</script>
</body>
</html>
