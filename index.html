<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Городской Магнат</title>
    <style>
        /* ===== ГЛОБАЛЬНЫЕ СТИЛИ ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a2e;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== КОНТЕЙНЕР КАРТЫ ===== */
        #map-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: #7cb342; /* запасной фон */
        }
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #8bc34a;
            cursor: grab;
            touch-action: none;
        }
        #gameCanvas:active { cursor: grabbing; }

        /* ===== СТЕКЛЯННЫЙ ЭФФЕКТ (glassmorphism) ===== */
        .glass {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25);
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ (абсолютная) ===== */
        #top-panel {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
            flex-wrap: wrap;
            gap: 8px;
        }
        #top-panel > * { pointer-events: auto; }

        /* Название игры */
        #game-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 1px;
            padding: 8px 18px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.15);
        }

        /* Баланс монет (справа сверху) */
        #coin-balance {
            padding: 6px 14px 6px 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 700;
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(8px);
            border-radius: 30px;
        }
        #coin-icon {
            font-size: 22px;
            filter: drop-shadow(0 0 4px rgba(255,215,0,0.6));
        }

        /* Кристаллы (под монетами) */
        #crystal-balance {
            padding: 4px 12px 4px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 16px;
            font-weight: 700;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            border-radius: 30px;
            margin-top: 4px;
        }
        #crystal-icon {
            font-size: 18px;
            filter: drop-shadow(0 0 6px rgba(0,150,255,0.5));
        }

        /* Правая колонка (монеты + кристаллы) */
        #right-stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        /* ===== УРОВЕНЬ И ОПЫТ (над футером) ===== */
        #level-bar {
            position: absolute;
            bottom: 80px;  /* над футером (высота футера 70px + отступ) */
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 24px);
            max-width: 700px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.10);
            z-index: 10;
        }
        #level-text {
            font-size: 18px;
            font-weight: 800;
            white-space: nowrap;
        }
        #exp-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.20);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        #exp-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        #exp-text {
            font-size: 12px;
            opacity: 0.8;
            white-space: nowrap;
            font-weight: 600;
        }

        /* ===== КНОПКА ЗАДАНИЙ (правый нижний угол) ===== */
        #tasks-btn {
            position: absolute;
            bottom: 84px;
            right: 12px;
            padding: 6px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            cursor: pointer;
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.10);
            transition: transform 0.2s;
        }
        #tasks-btn:active { transform: scale(0.92); }
        #tasks-btn span:first-child {
            font-size: 24px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
        }
        #tasks-btn span:last-child {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ===== ФУТЕР (5 кнопок) ===== */
        #bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 0;
            z-index: 20;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .footer-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
            color: rgba(255,255,255,0.7);
            transition: all 0.2s;
            width: 60px;
            padding: 4px 0;
            border-radius: 12px;
        }
        .footer-btn:active { background: rgba(255,255,255,0.08); }
        .footer-btn img {
            width: 30px;
            height: 30px;
            object-fit: contain;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }
        .footer-btn span {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 480px) {
            #game-title { font-size: 18px; padding: 6px 12px; }
            #coin-balance { font-size: 15px; padding: 4px 10px; }
            #crystal-balance { font-size: 13px; padding: 3px 8px; }
            #level-text { font-size: 15px; }
            #exp-text { font-size: 10px; }
            .footer-btn { width: 50px; }
            .footer-btn img { width: 26px; height: 26px; }
        }
    </style>
</head>
<body>

    <!-- ХЕДЕР (абсолютный) -->
    <div id="top-panel">
        <div id="game-title" class="glass">ГОРОДСКОЙ МАГНАТ</div>
        <div id="right-stats">
            <div id="coin-balance" class="glass">
                <span id="coin-icon">🪙</span>
                <span id="coin-amount">0</span>
            </div>
            <div id="crystal-balance" class="glass">
                <span id="crystal-icon">💎</span>
                <span id="crystal-amount">0</span>
            </div>
        </div>
    </div>

    <!-- КАРТА -->
    <div id="map-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <!-- УРОВЕНЬ / ОПЫТ (над футером) -->
    <div id="level-bar" class="glass">
        <span id="level-text">LVL 1</span>
        <div id="exp-track"><div id="exp-fill"></div></div>
        <span id="exp-text">0 XP</span>
    </div>

    <!-- КНОПКА ЗАДАНИЙ -->
    <div id="tasks-btn" class="glass">
        <span>📋</span>
        <span>Quests</span>
    </div>

    <!-- ФУТЕР -->
    <footer id="bottom-bar">
        <div class="footer-btn" data-page="bank">
            <img src="https://Rruslan007.github.io/my-city/assets/bank_icon.png" alt="Bank">
            <span>Bank</span>
        </div>
        <div class="footer-btn" data-page="resources">
            <img src="https://Rruslan007.github.io/my-city/assets/resources_icon.png" alt="Resources">
            <span>Resources</span>
        </div>
        <div class="footer-btn" data-page="home" id="home-btn">
            <img src="https://Rruslan007.github.io/my-city/assets/home_icon.png" alt="Home">
            <span>Home</span>
        </div>
        <div class="footer-btn" data-page="build">
            <img src="https://Rruslan007.github.io/my-city/assets/build_icon.png" alt="Build">
            <span>Build</span>
        </div>
        <div class="footer-btn" data-page="stats">
            <img src="https://Rruslan007.github.io/my-city/assets/statistic_icon.png" alt="Stats">
            <span>Stats</span>
        </div>
    </footer>

    <script>
        // ============================================================
        //  ПОЛНЫЙ JAVASCRIPT — ГЕНЕРАЦИЯ КАРТЫ, ДОРОГ, УЧАСТКОВ, UI
        // ============================================================

        // ---------- КОНСТАНТЫ ----------
        const MAP_W = 30000;
        const MAP_H = 20000;
        const GRASS_MARGIN = 20;          // зелёная рамка по краям
        const BASE_ROAD_WIDTH = 64;       // базовая ширина дороги
        const ROAD_VARIANTS = [0.8, 1.0, 1.2]; // коэффициенты ширины
        const PLOT_SIZES = [2, 3, 4, 5, 6, 8];  // размеры участков (в единицах)
        const PIXEL_PER_UNIT = 80;         // 1 единица = 80 пикселей

        // ---------- ПОЛУЧЕНИЕ ЭЛЕМЕНТОВ ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const coinAmount = document.getElementById('coin-amount');
        const crystalAmount = document.getElementById('crystal-amount');
        const expFill = document.getElementById('exp-fill');
        const levelText = document.getElementById('level-text');
        const expText = document.getElementById('exp-text');

        // ---------- ПЕРЕМЕННЫЕ КАМЕРЫ ----------
        let camera = { x: 0, y: 0 };
        let isDragging = false;
        let dragStart = { x: 0, y: 0 };
        let cameraStart = { x: 0, y: 0 };

        // ---------- ДАННЫЕ КАРТЫ ----------
        let plots = [];              // массив участков {x, y, size, w, h}
        let roads = [];             // массив дорог {x, y, w, h, type} (type: 'h' или 'v')
        let trees = [];             // позиции деревьев {x, y, size}

        // ---------- ИНИЦИАЛИЗАЦИЯ CANVAS ----------
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight - 70; // футер 70px
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ---------- ГЕНЕРАЦИЯ КАРТЫ ----------
        function generateCity() {
            plots = [];
            roads = [];
            trees = [];

            // Начинаем с отступом от края
            let startX = GRASS_MARGIN;
            let startY = GRASS_MARGIN;
            let currentX = startX;
            let currentY = startY;

            // Пока не достигли нижнего края
            while (currentY + 80 < MAP_H - GRASS_MARGIN) {
                // Определяем высоту текущей строки (максимальная из участков в строке)
                let rowHeight = 0;
                let rowPlots = [];
                currentX = startX;

                // Генерируем участки в строке
                while (currentX + 80 < MAP_W - GRASS_MARGIN) {
                    // Выбираем случайный размер
                    const size = PLOT_SIZES[Math.floor(Math.random() * PLOT_SIZES.length)];
                    const w = size * PIXEL_PER_UNIT;
                    const h = size * PIXEL_PER_UNIT;

                    // Проверяем, помещается ли участок
                    if (currentX + w + (roads.length > 0 ? BASE_ROAD_WIDTH : 0) > MAP_W - GRASS_MARGIN) {
                        break; // не хватает места по ширине — переходим на новую строку
                    }

                    // Создаём участок
                    const plot = {
                        x: currentX,
                        y: currentY,
                        size: size,
                        w: w,
                        h: h,
                        color: `hsl(${Math.random() * 60 + 80}, 60%, 60%)` // оттенки зелёного
                    };
                    plots.push(plot);
                    rowPlots.push(plot);

                    // Обновляем currentX с учётом дороги справа
                    const roadW = BASE_ROAD_WIDTH * ROAD_VARIANTS[Math.floor(Math.random() * ROAD_VARIANTS.length)];
                    currentX += w + roadW;

                    // Запоминаем дорогу (вертикальная)
                    if (currentX < MAP_W - GRASS_MARGIN) {
                        roads.push({
                            x: currentX - roadW,
                            y: currentY,
                            w: roadW,
                            h: h,
                            type: 'v'
                        });
                    }

                    // Обновляем высоту строки
                    if (h > rowHeight) rowHeight = h;
                }

                // После завершения строки: добавляем горизонтальную дорогу снизу
                if (rowPlots.length > 0) {
                    const roadH = BASE_ROAD_WIDTH * ROAD_VARIANTS[Math.floor(Math.random() * ROAD_VARIANTS.length)];
                    // Горизонтальная дорога под всей строкой
                    roads.push({
                        x: startX,
                        y: currentY + rowHeight,
                        w: currentX - startX,
                        h: roadH,
                        type: 'h'
                    });
                    currentY += rowHeight + roadH;
                } else {
                    // Если не удалось разместить ни одного участка — выходим
                    break;
                }
            }

            // Генерация деревьев на участках
            plots.forEach(plot => {
                const count = Math.floor(Math.random() * 3) + 1; // 1-3 дерева
                for (let i = 0; i < count; i++) {
                    const x = plot.x + 10 + Math.random() * (plot.w - 20);
                    const y = plot.y + 10 + Math.random() * (plot.h - 20);
                    const size = 12 + Math.random() * 8;
                    trees.push({ x, y, size });
                }
            });

            console.log(`Сгенерировано участков: ${plots.length}, дорог: ${roads.length}, деревьев: ${trees.length}`);
        }

        // ---------- ОТРИСОВКА ----------
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Фон (трава)
            ctx.fillStyle = '#8bc34a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Отрисовка дорог (только видимые)
            roads.forEach(road => {
                const rx = road.x - camera.x;
                const ry = road.y - camera.y;
                // Проверка видимости
                if (rx + road.w < 0 || rx > canvas.width || ry + road.h < 0 || ry > canvas.height) return;
                ctx.fillStyle = '#555';
                ctx.fillRect(rx, ry, road.w, road.h);
                // Разметка (упрощённо — белые линии)
                if (road.type === 'h') {
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.setLineDash([8, 12]);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(rx, ry + road.h/2);
                    ctx.lineTo(rx + road.w, ry + road.h/2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                } else {
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.setLineDash([8, 12]);
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(rx + road.w/2, ry);
                    ctx.lineTo(rx + road.w/2, ry + road.h);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            });

            // 3. Отрисовка участков
            plots.forEach(plot => {
                const px = plot.x - camera.x;
                const py = plot.y - camera.y;
                if (px + plot.w < 0 || px > canvas.width || py + plot.h < 0 || py > canvas.height) return;

                // Полупрозрачная заливка
                ctx.fillStyle = plot.color;
                ctx.globalAlpha = 0.3;
                ctx.fillRect(px, py, plot.w, plot.h);
                ctx.globalAlpha = 1.0;

                // Пунктирная рамка
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.setLineDash([6, 6]);
                ctx.lineWidth = 1.5;
                ctx.strokeRect(px, py, plot.w, plot.h);
                ctx.setLineDash([]);

                // Подпись размера
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${plot.size}×${plot.size}`, px + plot.w/2, py + plot.h/2);
            });

            // 4. Деревья
            trees.forEach(tree => {
                const tx = tree.x - camera.x;
                const ty = tree.y - camera.y;
                if (tx < -20 || tx > canvas.width + 20 || ty < -20 || ty > canvas.height + 20) return;
                // Рисуем кружок (вместо картинки дерева)
                ctx.fillStyle = '#2e7d32';
                ctx.beginPath();
                ctx.arc(tx, ty, tree.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#4caf50';
                ctx.beginPath();
                ctx.arc(tx-2, ty-3, tree.size*0.6, 0, Math.PI * 2);
                ctx.fill();
            });

            // 5. Центр города (сквер + мэрия)
            const centerX = MAP_W/2 - camera.x;
            const centerY = MAP_H/2 - camera.y;
            if (centerX > -400 && centerX < canvas.width + 400 && centerY > -400 && centerY < canvas.height + 400) {
                // Сквер (garden.png) — используем изображение
                const gardenImg = new Image();
                gardenImg.src = 'https://Rruslan007.github.io/my-city/assets/garden.png';
                // Рисуем, если загружено, иначе прямоугольник
                if (gardenImg.complete && gardenImg.naturalWidth > 0) {
                    ctx.drawImage(gardenImg, centerX - 200, centerY - 200, 400, 400);
                } else {
                    ctx.fillStyle = '#4caf50';
                    ctx.fillRect(centerX - 200, centerY - 200, 400, 400);
                    ctx.fillStyle = '#fff';
                    ctx.font = '20px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('Сквер', centerX, centerY);
                }

                // Мэрия (City_Hall.jpg)
                const hallImg = new Image();
                hallImg.src = 'https://Rruslan007.github.io/my-city/assets/City_Hall.jpg';
                if (hallImg.complete && hallImg.naturalWidth > 0) {
                    ctx.drawImage(hallImg, centerX + 220, centerY - 120, 240, 240);
                } else {
                    ctx.fillStyle = '#b0bec5';
                    ctx.fillRect(centerX + 220, centerY - 120, 240, 240);
                    ctx.fillStyle = '#fff';
                    ctx.font = '18px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('Мэрия', centerX + 340, centerY);
                }
            }
        }

        // ---------- УПРАВЛЕНИЕ КАМЕРОЙ ----------
        function startDrag(e) {
            isDragging = true;
            dragStart = { x: e.clientX, y: e.clientY };
            cameraStart = { ...camera };
        }

        function onDrag(e) {
            if (!isDragging) return;
            const dx = e.clientX - dragStart.x;
            const dy = e.clientY - dragStart.y;
            camera.x = Math.max(0, Math.min(MAP_W - canvas.width, cameraStart.x - dx));
            camera.y = Math.max(0, Math.min(MAP_H - canvas.height, cameraStart.y - dy));
            draw();
        }

        function endDrag() {
            isDragging = false;
        }

        // События мыши и тача
        canvas.addEventListener('mousedown', startDrag);
        window.addEventListener('mousemove', onDrag);
        window.addEventListener('mouseup', endDrag);

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            startDrag({ clientX: touch.clientX, clientY: touch.clientY });
        });
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            onDrag({ clientX: touch.clientX, clientY: touch.clientY });
        });
        window.addEventListener('touchend', endDrag);

        // Кнопка Home — центрирование карты
        document.getElementById('home-btn').addEventListener('click', () => {
            camera.x = Math.max(0, (MAP_W - canvas.width) / 2);
            camera.y = Math.max(0, (MAP_H - canvas.height) / 2);
            draw();
        });

        // ---------- ЗАПУСК ----------
        generateCity();
        // Центрируем при старте
        camera.x = Math.max(0, (MAP_W - canvas.width) / 2);
        camera.y = Math.max(0, (MAP_H - canvas.height) / 2);
        draw();

        // ---------- ОБРАБОТКА КНОПОК ФУТЕРА (заглушки) ----------
        document.querySelectorAll('.footer-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const page = this.dataset.page;
                if (page === 'home') return; // уже обработано
                alert(`Страница "${page}" будет реализована позже.`);
            });
        });

        // Задания
        document.getElementById('tasks-btn').addEventListener('click', () => {
            alert('Задания будут добавлены в следующей версии.');
        });

        // ---------- ИМИТАЦИЯ ДАННЫХ (баланс, опыт) ----------
        // Позже данные будут приходить от бота, сейчас просто для демонстрации
        setInterval(() => {
            // Случайно меняем баланс для эффекта
            const coins = Math.floor(Math.random() * 1000) + 100;
            const crystals = Math.floor(Math.random() * 50) + 1;
            coinAmount.textContent = coins;
            crystalAmount.textContent = crystals;
            // Опыт
            const exp = Math.floor(Math.random() * 80);
            expFill.style.width = exp + '%';
            expText.textContent = exp + ' XP';
        }, 5000);

        // ---------- ДОБАВЛЕНИЕ МАШИН (будущая механика) ----------
        // Пока не реализовано, будет добавлено на следующем этапе.
        console.log('Городской Магнат загружен!');
    </script>
</body>
</html>
